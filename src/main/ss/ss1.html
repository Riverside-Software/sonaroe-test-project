<body BGCOLOR="#FFFFFF"> 
<h1>Customer List</h1>
<table border>
<tr> 
<th>Customer ID</th>
<th>Customer Name</th>
<th>Phone Number</th>  
/tr> 
<script language="SpeedScript">
FOR EACH Customer FIELDS(CustNum Name Phone): </script>
<tr>
<td align=left> ‘Customer.CustNum‘ </td>
<td align=left> ‘Customer.Name‘ </td>
<td align=left> ‘Customer.Phone‘ </td>
/tr>
<script language="SpeedScript">
END. </script> 
</table>
</body>
